<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 080 - shadow mapping</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; color: white; font-family: 'Outfit', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 320px;
            pointer-events: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 1.15rem; color: #f1c40f; text-transform: lowercase; letter-spacing: 1px; }
        p { margin: 12px 0 0; font-size: 0.85rem; opacity: 0.7; line-height: 1.5; }
        .details {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #f1c40f;
            opacity: 0.9;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>day 080: the shadow camera</h1>
        <p>the yellow box represents the `CameraHelper` for the directional light. Notice how the orbiting spheres only cast shadows when they enter this invisible yellow box.</p>
        <div class="details">frustum size: 8x8 units</div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
