<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 083 - camera helpers</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: 'Outfit', sans-serif;}
        canvas { display: block; }

        /* The UI panel overlay */
        #ui {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 10;
            color: #ccc;
        }
        h1 { margin: 0; font-size: 1.15rem; color: #4facfe; text-transform: lowercase; letter-spacing: 1px; }
        p { margin: 10px 0 20px; font-size: 0.8rem; line-height: 1.5; }

        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; color: #888;}
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #4facfe;
        }
        .val { font-family: monospace; font-size: 0.8rem; background: #222; padding: 2px 6px; border-radius: 4px; float: right; color:#fff;}

        /* The split screen labels */
        #label-main {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            font-weight: bold;
        }
        #label-spectator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            font-weight: bold;
        }
        #divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: rgba(255,255,255,0.1);
            pointer-events: none;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>day 083: dual perspective</h1>
        <p>the left screen shows what the target camera sees. the right screen is an orbital spectator viewing the yellow camera helper.</p>
        
        <div class="control-group">
            <label>Field of View (FOV) <span id="val-fov" class="val">50°</span></label>
            <input type="range" id="fov" min="10" max="140" step="1" value="50">
        </div>

        <div class="control-group">
            <label>Far Clipping Plane <span id="val-far" class="val">15</span></label>
            <input type="range" id="far" min="3" max="40" step="1" value="15">
        </div>
    </div>
    
    <div id="label-main">target output</div>
    <div id="label-spectator">spectator view</div>
    <div id="divider"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
