<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 076 - hemisphere gradients</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Outfit', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(25px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 1.25rem; color: #ff00ff; text-transform: lowercase; letter-spacing: 2px; }
        p { margin: 12px 0 0; font-size: 0.85rem; opacity: 0.7; line-height: 1.6; }
        .gradient-bar {
            margin-top: 20px;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, #00ffff, #ff00ff);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>day 076: synthwave</h1>
        <p>manipulating the hemisphere's upward vector to rotate the color gradient along different axes. there are no other lights in this scene.</p>
        <div class="gradient-bar"></div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
