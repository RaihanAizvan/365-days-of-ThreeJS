<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 079 - shadow theory</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eeece5; font-family: 'Outfit', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 280px;
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            color: #222;
        }
        h1 { margin: 0; font-size: 1.25rem; color: #111; text-transform: lowercase; letter-spacing: 1px; }
        p { margin: 12px 0 0; font-size: 0.85rem; opacity: 0.7; line-height: 1.6; }
        .checklist {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 15px;
        }
        .item { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: 500; }
        .checkmark { color: #4caf50; font-weight: bold; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>day 079: blocking light</h1>
        <p>a fundamental demonstration of objects explicitly casting and receiving shadows under a directional light source.</p>
        <div class="checklist">
            <div class="item"><span class="checkmark">✓</span> renderer.shadowMap.enabled</div>
            <div class="item"><span class="checkmark">✓</span> light.castShadow</div>
            <div class="item"><span class="checkmark">✓</span> cube.castShadow</div>
            <div class="item"><span class="checkmark">✓</span> plane.receiveShadow</div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
