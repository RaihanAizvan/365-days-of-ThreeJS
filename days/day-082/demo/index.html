<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day 082 - shadow resolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e8e8e8; font-family: 'Outfit', sans-serif;}
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            max-width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            color: #333;
        }
        h1 { margin: 0; font-size: 1.2rem; color: #2980b9; text-transform: lowercase; letter-spacing: 1px; }
        p { margin: 10px 0 20px; font-size: 0.85rem; opacity: 0.8; line-height: 1.5; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 8px 10px;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #f0f0f0; }
        button.active { background: #2980b9; color: #fff; border-color: #2980b9; }
        .label-wrap { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase}
        .resolution-readout { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace}
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <h1>day 082: pixel perfection</h1>
        <p>toggle the map density and algorithmic softening to witness the radical difference in shadow presentation and quality.</p>
        
        <div class="label-wrap">
            <span>map resolution</span>
            <span class="resolution-readout" id="resText">256x256</span>
        </div>
        <div class="btn-group" id="resGroup">
            <button data-res="128">128</button>
            <button data-res="256" class="active">256</button>
            <button data-res="1024">1024</button>
            <button data-res="4096">4K!!</button>
        </div>

        <div class="label-wrap">
            <span>soft algorithm (PCF)</span>
            <span class="resolution-readout" id="algText">OFF</span>
        </div>
        <div class="btn-group" id="algGroup">
            <button data-soft="false" class="active">Sharp (Jagged)</button>
            <button data-soft="true">Soft (Blurred)</button>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
